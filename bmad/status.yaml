project: css-base-demo-skins
description: 10 demo pages showcasing @medyll/css-base as a skinnable design system
phase: development
progress: 100
active_role: scrum

# ─────────────────────────────────────────────────────────────────────────────
# IMPORTANT CONTEXT — READ BEFORE CONTINUING
# ─────────────────────────────────────────────────────────────────────────────
# These demos are NOT decorative. They are the validation test suite for
# @medyll/css-base itself. Every visual defect found in a demo indicates a
# potential bug or missing token in the BASE CSS (app.css, variables.css,
# typography.css, components.css, attr.css) — not just in the skin.
#
# KNOWN OPEN ISSUE (user-reported, screenshot provided):
#   → The hub page and demos look cramped/tight — "pas de padding, tout est serré"
#   → Root cause suspected: default-font-size is 14px (too small), and padding
#     tokens (--pad-*, --gap-*) may be too tight for a demo-quality presentation.
#   → FIX STRATEGY: audit variables.css default spacing scale, increase
#     --default-font-size to 16px or adjust --pad-md/--gap-md upward, then
#     verify all 10 demos reflect the fix.
#
# DUAL-FIX RULE: when a demo looks wrong, always check:
#   1. Is this a base CSS token problem? → fix dist/variables.css or dist/tokens.css
#   2. Is this skin-specific? → fix dist/demo/SKIN/skin.css
#   Never fix only one side without checking the other.
# ─────────────────────────────────────────────────────────────────────────────

next_action: >
  Sprint 1 complete. At decision point. See IMPORTANT CONTEXT above before acting.

  Options:
    1. Fix — audit and fix the padding/font-size tightness issue in the base CSS
             (variables.css default-font-size, --pad-*, --gap-*) → re-screenshot all 10 demos
    2. Test — continue automated QA + visual regression on all 10 skins
    3. Polish — iterate pixel-perfect on existing skins
    4. Sprint 2 — implement new demo skins (see backlog_demos below)
    5. Pause

next_command: "bmad continue"
next_role: scrum

