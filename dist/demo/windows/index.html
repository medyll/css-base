<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows 11 — css-base skin demo</title>
<script src="../shared/theme-toggle.js"></script>
<link rel="stylesheet" href="../../app.css">
<link rel="stylesheet" href="./skin.css">
</head>
<body>
<nav class="flex items-center justify-between p-sm" style="border-bottom:var(--border-width) solid var(--color-border);background:var(--color-surface-alt);">
  <div class="flex items-center gap-sm">
    <a href="../index.html" class="font-semibold" style="text-decoration:none;color:var(--color-text);">css-base demos</a>
    <span style="color:var(--color-text-muted);">|</span>
    <a href="../netflix/" class="badge">Netflix</a>
    <a href="../amazon/" class="badge">Amazon</a>
    <a href="../whatsapp/" class="badge">WhatsApp</a>
    <a href="../windows/" class="badge badge-primary">Windows</a>
    <a href="../macos/" class="badge">macOS</a>
    <a href="../spotify/" class="badge">Spotify</a>
    <a href="../slack/" class="badge">Slack</a>
    <a href="../github/" class="badge">GitHub</a>
    <a href="../dashboard/" class="badge">Dashboard</a>
    <a href="../terminal/" class="badge">Terminal</a>
  </div>
  <button class="btn btn-ghost" onclick="toggleTheme()">🌓</button>
</nav>

<!-- Desktop -->
<div style="background:linear-gradient(135deg,oklch(0.55 0.12 250),oklch(0.45 0.15 280));min-height:calc(100vh - 100px);padding:var(--pad-xl);position:relative;">

  <!-- Start Menu -->
  <div class="card" data-elevation="lg" style="max-width:620px;margin:0 auto;backdrop-filter:blur(20px);background:oklch(1 0 0 / 0.85);">
    <div class="card-body">
      <div class="flex items-center gap-sm mb-md">
        <input type="text" placeholder="Search apps, settings, documents..." class="input" style="flex:1;">
      </div>

      <p class="font-semibold text-sm text-muted mb-sm">Pinned</p>
      <div class="grid" data-columns="6" data-gap="sm" style="margin-bottom:var(--marg-lg);">
        <div style="text-align:center;padding:var(--pad-sm);border-radius:var(--radius-md);cursor:pointer;" onmouseover="this.style.background='var(--color-surface-alt)'" onmouseout="this.style.background=''">
          <div style="font-size:2rem;">📁</div><p class="text-sm">Explorer</p>
        </div>
        <div style="text-align:center;padding:var(--pad-sm);border-radius:var(--radius-md);cursor:pointer;" onmouseover="this.style.background='var(--color-surface-alt)'" onmouseout="this.style.background=''">
          <div style="font-size:2rem;">🌐</div><p class="text-sm">Edge</p>
        </div>
        <div style="text-align:center;padding:var(--pad-sm);border-radius:var(--radius-md);cursor:pointer;" onmouseover="this.style.background='var(--color-surface-alt)'" onmouseout="this.style.background=''">
          <div style="font-size:2rem;">📧</div><p class="text-sm">Mail</p>
        </div>
        <div style="text-align:center;padding:var(--pad-sm);border-radius:var(--radius-md);cursor:pointer;" onmouseover="this.style.background='var(--color-surface-alt)'" onmouseout="this.style.background=''">
          <div style="font-size:2rem;">📅</div><p class="text-sm">Calendar</p>
        </div>
        <div style="text-align:center;padding:var(--pad-sm);border-radius:var(--radius-md);cursor:pointer;" onmouseover="this.style.background='var(--color-surface-alt)'" onmouseout="this.style.background=''">
          <div style="font-size:2rem;">📷</div><p class="text-sm">Photos</p>
        </div>
        <div style="text-align:center;padding:var(--pad-sm);border-radius:var(--radius-md);cursor:pointer;" onmouseover="this.style.background='var(--color-surface-alt)'" onmouseout="this.style.background=''">
          <div style="font-size:2rem;">⚙️</div><p class="text-sm">Settings</p>
        </div>
      </div>

      <p class="font-semibold text-sm text-muted mb-sm">Recommended</p>
      <div class="grid" data-columns="2" data-gap="sm">
        <div class="flex items-center gap-sm p-sm" style="border-radius:var(--radius-md);cursor:pointer;" onmouseover="this.style.background='var(--color-surface-alt)'" onmouseout="this.style.background=''">
          <span style="font-size:1.4rem;">📄</span>
          <div><p class="text-sm font-semibold">Report_Q4.docx</p><p class="text-muted text-sm">2 hours ago</p></div>
        </div>
        <div class="flex items-center gap-sm p-sm" style="border-radius:var(--radius-md);cursor:pointer;" onmouseover="this.style.background='var(--color-surface-alt)'" onmouseout="this.style.background=''">
          <span style="font-size:1.4rem;">📊</span>
          <div><p class="text-sm font-semibold">Budget_2024.xlsx</p><p class="text-muted text-sm">Yesterday</p></div>
        </div>
      </div>

      <div class="flex justify-between items-center" style="margin-top:var(--marg-md);padding-top:var(--pad-md);border-top:var(--border-width) solid var(--color-border);">
        <div class="flex items-center gap-sm">
          <div class="btn btn-primary" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;">U</div>
          <span class="font-semibold text-sm">User</span>
        </div>
        <button class="btn btn-ghost">⏻ Power</button>
      </div>
    </div>
  </div>
</div>

<!-- Taskbar -->
<div class="flex items-center justify-center gap-sm" style="background:oklch(1 0 0 / 0.75);backdrop-filter:blur(20px);padding:var(--pad-xs) var(--pad-xl);border-top:var(--border-width) solid var(--color-border);position:fixed;bottom:0;left:0;right:0;">
  <button class="btn btn-ghost" style="padding:var(--pad-xs)">🪟</button>
  <button class="btn btn-ghost" style="padding:var(--pad-xs)">🔍</button>
  <button class="btn btn-ghost" style="padding:var(--pad-xs)">🗂️</button>
  <div style="width:1px;height:20px;background:var(--color-border);margin:0 var(--marg-xs);"></div>
  <button class="btn btn-ghost" style="padding:var(--pad-xs)">📁</button>
  <button class="btn btn-ghost" style="padding:var(--pad-xs)">🌐</button>
  <button class="btn btn-ghost" style="padding:var(--pad-xs)">📧</button>
  <div style="margin-left:auto;font-size:0.75rem;text-align:right;">
    <p>12:34</p><p>04/04/2026</p>
  </div>
</div>
</body>
</html>
